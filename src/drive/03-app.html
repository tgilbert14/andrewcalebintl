<script>
(function () {
  'use strict';

  /* ---------- Environment (house pattern, Side A) ---------- */
  var store = {
    get: function (k) { try { return sessionStorage.getItem(k); } catch (e) { return null; } },
    set: function (k, v) { try { sessionStorage.setItem(k, v); } catch (e) {} }
  };
  var RM = false, rmMq = null;
  try { rmMq = matchMedia('(prefers-reduced-motion: reduce)'); RM = rmMq.matches; } catch (e) {}
  var fxPref = store.get('aci_fx'); /* shared with Side A: one tape, one FX law */
  if (fxPref === '0') RM = true; else if (fxPref === '1') RM = false;
  if (RM) document.documentElement.classList.add('rm');
  /* A prerendered document computed RM before the user may have toggled
     FX on the referring page — re-read at activation. */
  if (document.prerendering) {
    document.addEventListener('prerenderingchange', function () {
      var p2 = store.get('aci_fx');
      if (p2 === '0') RM = true;
      else if (p2 === '1') RM = false;
      else { try { RM = rmMq ? rmMq.matches : false; } catch (e) {} }
      document.documentElement.classList.toggle('rm', RM);
    });
  }

  var COARSE = false;
  try { COARSE = matchMedia('(hover: none) and (pointer: coarse)').matches; } catch (e) {}

  var $ = function (s) { return document.querySelector(s); };
  var $$ = function (s) { return Array.prototype.slice.call(document.querySelectorAll(s)); };
  var clamp = function (v, a, b) { return v < a ? a : (v > b ? b : v); };
  var smooth = function (x) { x = clamp(x, 0, 1); return x * x * (3 - 2 * x); };
  /* Monotone dwell remap: f(0)=0, f(1)=1, camera settles mid-scene where the
     copy peaks. (1-L)x + L(4(x-.5)^3+.5). */
  var lingerEase = function (x, L) { var c = x - 0.5; return (1 - L) * x + L * (4 * c * c * c + 0.5); };
  /* Trapezoid presence envelope over journey time */
  function env(T, a, b, c, d) {
    if (T <= a || T >= d) return 0;
    if (T < b) return smooth((T - a) / (b - a));
    if (T > c) return smooth(1 - (T - c) / (d - c));
    return 1;
  }

  var AE = { on: false };

  /* ============================================================
     JOURNEY LAYOUT — spacer track, six bands, lerped time
     ============================================================ */
  var WEIGHTS = [1.5, 1.2, 1.1, 1.2, 1.2, 2.2];
  var LINGER  = [0.35, 0, 0, 0, 0, 0.25];
  var N = 6;
  var track = $('#track');
  var scenes = $$('.scene');
  var bands = [];
  var vh = innerHeight, laidW = innerWidth, trackH = 1;
  var targetT = 0, curT = 0;

  function layout() {
    vh = innerHeight; laidW = innerWidth;
    var off = 0;
    bands = WEIGHTS.map(function (w) {
      var s = off * vh; off += w;
      return { start: s, end: off * vh };
    });
    trackH = off * vh + Math.round(vh * 0.5);
    track.style.height = trackH + 'px';
    read();
  }
  var vtForce = -1; /* ?vt=N pins journey time without scrolling (capture rig) */
  function read() {
    if (vtForce >= 0) { targetT = vtForce; return; }
    var y = scrollY;
    var i = 0;
    for (var k = 0; k < N; k++) { if (y >= bands[k].start) i = k; }
    var b = bands[i];
    /* Degenerate bands (zero-size load) must not divide by zero: NaN here
       poisons curT and every accumulator downstream. */
    var span = b.end - b.start;
    var pr = span > 0 ? clamp((y - b.start) / span, 0, 1) : 0;
    targetT = i + (LINGER[i] ? lingerEase(pr, LINGER[i]) : pr);
  }
  var ticking = false;
  addEventListener('scroll', function () {
    if (!ticking) { ticking = true; requestAnimationFrame(function () { ticking = false; read(); }); }
  }, { passive: true });

  /* URL-bar rule: on touch, a height-only resize must not rebuild the track
     (it yanks the scroll position); the canvas backing store still resizes. */
  addEventListener('resize', function () {
    if (COARSE && innerWidth === laidW) { resizeCanvas(); return; }
    layout(); resizeCanvas();
  });
  addEventListener('orientationchange', function () { layout(); resizeCanvas(); });

  /* ============================================================
     THE WORLD — one canvas, everything procedural.
     Grid + road are perspective-divide canvas math on purpose: the CSS
     rotateX + background-position variant is the documented GPU landmine.
     No shadowBlur in the frame loop; glow = pre-rendered sprites +
     layered strokes.
     ============================================================ */
  var canvas = $('#world'), ctx = canvas.getContext('2d');
  var W = innerWidth, H = innerHeight, DPR = 1;
  var firstPaint = false;
  var rearH = 0; /* carRear layout height, cached — never read layout in the frame loop */
  var spriteW = 0, spriteH = 0, spriteTimer = 0;

  function resizeCanvas() {
    W = innerWidth; H = innerHeight;
    DPR = Math.min(devicePixelRatio || 1, COARSE ? 1.5 : 2);
    /* Backing-store budget: the finale is ~4 full-viewport alpha passes
       (sky + sun glow + grid wash + whiteout); cap total pixels so a
       5K/4K-at-2x desktop doesn't pay 14MP x 4 every frame. Slight
       softness is hidden by the scanline overlay. */
    DPR = Math.min(DPR, Math.max(1, Math.sqrt(4.5e6 / Math.max(1, W * H))));
    canvas.width = Math.round(W * DPR);
    canvas.height = Math.round(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    /* Sprites are sized off W/H; a phone URL-bar collapse (or a desktop
       drag-resize storm) must not rebuild 20 offscreen canvases per event —
       first build synchronous, rebuilds debounced. */
    if (W !== spriteW || Math.abs(H - spriteH) > H * 0.12) {
      if (!sprMid.length) {
        spriteW = W; spriteH = H;
        buildSprites();
      } else {
        clearTimeout(spriteTimer);
        spriteTimer = setTimeout(function () {
          spriteW = W; spriteH = H;
          buildSprites();
          lastDrawnT = -9; /* rm postcards repaint with the resized sprites */
        }, 150);
      }
    }
    var cr = $('#carRear');
    rearH = cr ? cr.offsetHeight : 0;
    lastDrawnT = -9; /* force repaint */
  }

  /* Deterministic PRNG so the skyline is the same skyline every visit */
  function mulberry(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  function hex(c) { return [parseInt(c.slice(1, 3), 16), parseInt(c.slice(3, 5), 16), parseInt(c.slice(5, 7), 16)]; }
  function lerpC(a, b, k) {
    return 'rgb(' + Math.round(a[0] + (b[0] - a[0]) * k) + ',' + Math.round(a[1] + (b[1] - a[1]) * k) + ',' + Math.round(a[2] + (b[2] - a[2]) * k) + ')';
  }

  /* Sky keyframes across the journey. 5 stops each; bridged per the outrun
     law: orange never touches blue without magenta in between. */
  var SKY_T = [0, 1, 2, 3, 4, 4.9, 6];
  var SKY = [
    [[0, '#120230'], [0.42, '#3a0f5e'], [0.66, '#6a00a8'], [0.84, '#d4009f'], [1, '#ff6a00']],
    [[0, '#05000e'], [0.45, '#120230'], [0.72, '#2a0d52'], [0.9, '#3a0f5e'], [1, '#4a1a75']],
    [[0, '#05000e'], [0.45, '#0c0c1e'], [0.72, '#2a0d52'], [0.9, '#58164a'], [1, '#b0430f']],
    [[0, '#05000e'], [0.42, '#0e0430'], [0.68, '#30255f'], [0.88, '#522f81'], [1, '#6a3fa0']],
    [[0, '#0c0c1e'], [0.4, '#120458'], [0.62, '#580e91'], [0.82, '#C600FF'], [1, '#ff2975']],
    [[0, '#120458'], [0.32, '#8317d1'], [0.56, '#e01bb4'], [0.74, '#ff3d8f'], [1, '#ff7a1f']],
    [[0, '#3a0f5e'], [0.26, '#8317d1'], [0.46, '#e01bb4'], [0.64, '#ff3d8f'], [1, '#ffd91f']]
  ].map(function (ks) { return ks.map(function (s) { return [s[0], hex(s[1])]; }); });

  function skyAt(T) {
    var i = 0;
    while (i < SKY_T.length - 2 && T > SKY_T[i + 1]) i++;
    var k = smooth((T - SKY_T[i]) / (SKY_T[i + 1] - SKY_T[i]));
    var A = SKY[i], B = SKY[i + 1], out = [];
    for (var s = 0; s < A.length; s++) {
      out.push([A[s][0] + (B[s][0] - A[s][0]) * k, lerpC(A[s][1], B[s][1], k)]);
    }
    return out;
  }

  /* ---------- Precomputed world furniture ---------- */
  var stars = [], shimmer = [], rain = [], ridgeL = [], ridgeR = [];
  (function seedWorld() {
    var r = mulberry(1986);
    for (var i = 0; i < 110; i++) {
      stars.push({ x: r(), y: r() * 0.58, r: 0.5 + r() * 1.1, ph: r() * 6.28, sp: 0.4 + r() * 1.4, c: r() < 0.12 ? '#00f2ff' : (r() < 0.2 ? '#ff7bff' : '#ffffff') });
    }
    for (i = 0; i < 64; i++) {
      shimmer.push({ x: r(), y: r(), len: 14 + r() * 60, ph: r() * 6.28, sp: 0.3 + r() * 0.8, c: r() < 0.3 ? '#04d9ff' : (r() < 0.5 ? '#b026ff' : '#ffffff') });
    }
    for (i = 0; i < 72; i++) {
      rain.push({ x: r(), y: r(), len: 8 + r() * 22, sp: 0.7 + r() * 1.3, a: 0.12 + r() * 0.32 });
    }
    var x, y;
    for (x = 0; x <= 12; x++) { ridgeL.push([x / 12 * 0.44, (x % 2 ? 0.05 : 0.02) + r() * 0.075]); }
    for (x = 0; x <= 12; x++) { ridgeR.push([0.56 + x / 12 * 0.44, (x % 2 ? 0.055 : 0.02) + r() * 0.07]); }
  })();

  /* Finale skyline: the neon city on the horizon right of the sun (the
     Summer 1985 frame). Norm-space so it survives resizes untouched. */
  var FCITY = [];
  (function seedFinaleCity() {
    var r = mulberry(1959);
    var x = 0.545;
    while (x < 0.965) {
      var w = 0.016 + r() * 0.028;
      var h = 0.045 + r() * 0.115;
      var b = { x: x, w: w, h: h, ant: r() < 0.22, neon: r() < 0.34 ? (r() < 0.5 ? 'rgba(0,242,255,.6)' : 'rgba(255,64,255,.55)') : null, win: [] };
      var n = Math.round(4 + h * 90);
      for (var k = 0; k < n; k++) {
        b.win.push({ dx: r(), dy: r(), sp: 0.3 + r() * 1.1, ph: r() * 6.28, c: r() < 0.5 ? 'rgba(255,204,0,.8)' : (r() < 0.75 ? 'rgba(0,242,255,.75)' : 'rgba(255,246,201,.85)') });
      }
      FCITY.push(b);
      x += w + 0.004 + r() * 0.014;
    }
  })();

  /* Building strips (far + mid) and their periods, in world px */
  var FAR = [], MID = [], FAR_P = 0, MID_P = 0;
  (function seedCity() {
    var r = mulberry(305);
    var x = 0, i;
    for (i = 0; i < 42; i++) {
      var w = 26 + r() * 70, h = 0.05 + r() * 0.17;
      FAR.push({ x: x, w: w, h: h, ant: r() < 0.18 });
      x += w + 4 + r() * 26;
    }
    FAR_P = x + 60;
    x = 0;
    for (i = 0; i < 20; i++) {
      var w2 = 90 + r() * 130, h2 = 0.16 + r() * 0.34;
      MID.push({ x: x, w: w2, h: h2, seed: (r() * 1e9) | 0, neon: r() < 0.3 ? (r() < 0.5 ? '#ff00ff' : '#00f2ff') : null });
      x += w2 + 30 + r() * 90;
    }
    MID_P = x + 120;
  })();

  /* ---------- Sprites (pre-rendered once per resize; shadowBlur lives
     here, at build time, never in the frame loop) ---------- */
  var sprMid = [], sprPalm = [], sprGlowAmber, sprGlowMoon, sprSun = null, sunR = 0;
  var PALM_PATHS = [
    'M98 320 C92 260 100 200 114 128 L126 132 C116 200 108 262 116 320 Z',
    'M120 126 C150 96 190 88 212 100 C182 102 152 116 128 138 Z',
    'M120 128 C156 122 196 132 214 154 C184 146 150 142 124 142 Z',
    'M122 132 C150 148 172 172 178 198 C158 176 136 158 118 146 Z',
    'M118 126 C92 92 56 82 30 92 C62 96 94 112 112 136 Z',
    'M118 128 C84 118 44 124 22 144 C54 138 90 140 114 142 Z',
    'M116 132 C92 150 72 176 68 202 C86 178 106 158 120 146 Z',
    'M119 124 C116 94 124 66 142 52 C132 76 130 102 126 128 Z'
  ];
  function glowSprite(color, size) {
    var c = document.createElement('canvas'); c.width = c.height = size;
    var g = c.getContext('2d');
    var gr = g.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
    gr.addColorStop(0, color); gr.addColorStop(1, 'rgba(0,0,0,0)');
    g.fillStyle = gr; g.fillRect(0, 0, size, size);
    return c;
  }
  function buildSprites() {
    sprGlowAmber = glowSprite('rgba(255,204,0,.5)', 64);
    sprGlowMoon = glowSprite('rgba(233,237,245,.35)', 128);
    /* Mid buildings: silhouette + lit windows, one offscreen each */
    sprMid = MID.map(function (b) {
      var hpx = Math.max(24, Math.round(b.h * H));
      var c = document.createElement('canvas');
      c.width = Math.ceil(b.w); c.height = hpx;
      var g = c.getContext('2d');
      g.fillStyle = '#150335';
      g.fillRect(0, 0, b.w, hpx);
      g.fillStyle = 'rgba(255,0,255,.06)';
      g.fillRect(0, 0, b.w, 3);
      var rr = mulberry(b.seed);
      var cols = Math.max(2, Math.floor(b.w / 20)), rows = Math.max(3, Math.floor(hpx / 26));
      for (var ci = 0; ci < cols; ci++) {
        for (var ri = 0; ri < rows; ri++) {
          if (rr() < 0.26) {
            g.fillStyle = rr() < 0.6 ? 'rgba(255,204,0,.75)' : (rr() < 0.8 ? 'rgba(0,242,255,.7)' : 'rgba(255,246,201,.8)');
            g.fillRect(6 + ci * (b.w - 10) / cols, 8 + ri * (hpx - 12) / rows, 4, 6);
          }
        }
      }
      if (b.neon) {
        g.strokeStyle = b.neon; g.lineWidth = 2;
        g.shadowColor = b.neon; g.shadowBlur = 7;
        g.strokeRect(1, 1, b.w - 2, hpx - 2);
        g.shadowBlur = 0;
      }
      return c;
    });
    /* Palms: Side A's exact fronds, two sizes, soft rim */
    sprPalm = [0.42, 0.3].map(function (hf) {
      var hpx = Math.round(hf * H), wpx = Math.round(hpx * 220 / 320);
      var c = document.createElement('canvas');
      c.width = wpx; c.height = hpx;
      var g = c.getContext('2d');
      g.scale(wpx / 220, hpx / 320);
      g.fillStyle = '#05000e';
      g.shadowColor = 'rgba(255,0,255,.35)'; g.shadowBlur = 6;
      PALM_PATHS.forEach(function (d) { g.fill(new Path2D(d)); });
      g.beginPath(); g.arc(112, 138, 7, 0, 7); g.fill();
      g.beginPath(); g.arc(128, 142, 6, 0, 7); g.fill();
      return c;
    });
    sprSun = null; sunR = 0;
  }

  /* The banded sun: redrawn offscreen only when its radius changes.
     Slat cuts reuse Side A's hero-sun mask stops. */
  var sunCanvas = document.createElement('canvas');
  var SLATS = [[0.54, 0.57], [0.65, 0.69], [0.76, 0.81], [0.87, 0.93]];
  function sunSprite(r) {
    if (sprSun && Math.abs(r - sunR) < 0.75) return sunCanvas;
    sunR = r; sprSun = true;
    var d = Math.max(4, Math.round(r * 2));
    sunCanvas.width = d; sunCanvas.height = d;
    var g = sunCanvas.getContext('2d');
    var gr = g.createRadialGradient(d / 2, d * 0.32, 0, d / 2, d * 0.42, d * 0.62);
    gr.addColorStop(0, '#fff6c9'); gr.addColorStop(0.35, '#ffd91f');
    gr.addColorStop(0.68, '#ff901f'); gr.addColorStop(1, '#ff2975');
    g.fillStyle = gr;
    g.beginPath(); g.arc(d / 2, d / 2, d / 2, 0, 7); g.fill();
    g.globalCompositeOperation = 'destination-out';
    SLATS.forEach(function (s) { g.fillRect(0, s[0] * d, d, (s[1] - s[0]) * d); });
    g.globalCompositeOperation = 'source-over';
    return sunCanvas;
  }
  var sprSunGlow = glowSprite('rgba(255,122,31,.55)', 256);

  /* ---------- Render ---------- */
  var worldX = 0, driftDist = 0, gridPhase = 0, lastDrawnT = -9;

  function drawLayerStrip(list, period, speed, baseY, colorFill, isFar, alpha) {
    var xoff = (worldX * speed) % period;
    ctx.globalAlpha = alpha;
    for (var rep = -1; rep <= Math.ceil(W / period) + 1; rep++) {
      var ox = rep * period - xoff;
      if (ox > W || ox + period < -200) continue;
      for (var i = 0; i < list.length; i++) {
        var b = list[i], x = ox + b.x;
        if (x + b.w < -20 || x > W + 20) continue;
        if (isFar) {
          var hpx = b.h * H;
          ctx.fillStyle = colorFill;
          ctx.fillRect(x, baseY - hpx, b.w, hpx);
          if (b.ant) {
            ctx.fillRect(x + b.w / 2 - 1, baseY - hpx - 12, 2, 12);
            ctx.fillStyle = 'rgba(255,43,43,.8)';
            ctx.fillRect(x + b.w / 2 - 1.5, baseY - hpx - 15, 3, 3);
          }
        } else {
          var spr = sprMid[i];
          ctx.drawImage(spr, x, baseY - spr.height);
        }
      }
    }
    ctx.globalAlpha = 1;
  }

  function render(T, time) {
    var hor = H * (0.70 - 0.08 * smooth((T - 4.4) / 0.7)); /* horizon lifts for the finale stage */
    var roadTop = H * 0.84;

    /* SKY */
    var sky = skyAt(T);
    var g = ctx.createLinearGradient(0, 0, 0, hor + H * 0.06);
    for (var i = 0; i < sky.length; i++) g.addColorStop(clamp(sky[i][0], 0, 1), sky[i][1]);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, hor + 2);

    /* Ground base under horizon (scene floors paint over this) */
    ctx.fillStyle = '#05000e';
    ctx.fillRect(0, hor, W, H - hor);

    /* STARS */
    var aStars = env(T, 0.55, 1.1, 4.6, 5.4);
    if (aStars > 0.01) {
      var sunCX = W / 2, sunCY = hor;
      var sunMix = smooth((T - 4.5) / 0.3); /* the glow washes nearby stars out gradually */
      for (i = 0; i < stars.length; i++) {
        var st = stars[i];
        var tw = RM ? 0.7 : 0.45 + 0.55 * (0.5 + 0.5 * Math.sin(time * st.sp + st.ph));
        var sx = st.x * W, sy = st.y * hor;
        var dimNearSun = sunMix > 0 ? 1 - sunMix * (1 - clamp(Math.hypot(sx - sunCX, sy - sunCY) / (H * 0.5) - 0.3, 0, 1)) : 1;
        ctx.globalAlpha = aStars * tw * dimNearSun;
        ctx.fillStyle = st.c;
        ctx.fillRect(sx, sy, st.r, st.r);
      }
      ctx.globalAlpha = 1;
    }

    /* CITY RAIN — a quiet moving scrim that makes the first departure feel
       materially different from the clear coast that follows. */
    var aRain = env(T, 0.55, 0.9, 1.75, 2.2);
    if (aRain > 0.01) {
      ctx.lineWidth = 1;
      for (i = 0; i < rain.length; i++) {
        var rn = rain[i];
        var ry = RM ? rn.y * H : ((rn.y * H + time * 260 * rn.sp) % (H + 70)) - 35;
        var rx = ((rn.x * W - worldX * 0.035) % (W + 100) + W + 100) % (W + 100) - 50;
        ctx.globalAlpha = aRain * rn.a;
        ctx.strokeStyle = i % 7 === 0 ? '#00f2ff' : '#dff3ff';
        ctx.beginPath(); ctx.moveTo(rx, ry); ctx.lineTo(rx - rn.len * 0.35, ry + rn.len); ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    /* MOON (coast) */
    var aMoon = env(T, 2.75, 3.15, 4.1, 4.6);
    var moonX = W * 0.72, moonY = H * 0.2;
    if (aMoon > 0.01) {
      ctx.globalAlpha = aMoon;
      ctx.drawImage(sprGlowMoon, moonX - 64, moonY - 64, 128, 128);
      ctx.fillStyle = '#f4f6ff';
      ctx.beginPath(); ctx.arc(moonX, moonY, H * 0.028, 0, 7); ctx.fill();
      ctx.fillStyle = 'rgba(210,215,235,.55)';
      ctx.beginPath(); ctx.arc(moonX - H * 0.007, moonY + H * 0.004, H * 0.006, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.arc(moonX + H * 0.009, moonY - H * 0.008, H * 0.004, 0, 7); ctx.fill();
      ctx.globalAlpha = 1;
    }

    /* The incoming coast transmission becomes visible as expanding carrier
       rings. Slow, scroll-gated and decorative; no strobe or flash. */
    var aCarrier = env(T, 3.15, 3.4, 3.95, 4.3);
    if (aCarrier > 0.01) {
      var carrierPhase = RM ? 0.45 : (time * 0.18) % 1;
      for (var cr = 0; cr < 3; cr++) {
        var cp = (carrierPhase + cr / 3) % 1;
        ctx.globalAlpha = aCarrier * (1 - cp) * 0.5;
        ctx.strokeStyle = cr === 1 ? '#ff00ff' : '#00f2ff';
        ctx.lineWidth = 1.4;
        ctx.beginPath(); ctx.arc(moonX, moonY, H * (0.045 + cp * 0.12), -0.5, 2.15); ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    /* THE SUN (rises through TRK 05, swells through TRK 06) */
    var aSun = env(T, 4.25, 4.95, 6, 6.01);
    if (aSun > 0.01) {
      var rise = smooth((T - 4.25) / 0.75);
      var swell = clamp((T - 5) / 1, 0, 1);
      var r = H * (0.05 + 0.07 * rise + 0.34 * smooth(swell));
      var cy = hor + r * (1 - rise) - r * 0.35 * swell; /* high enough that the slats clear the horizon */
      var spr = sunSprite(r);
      ctx.globalAlpha = aSun;
      var gs = r * 5.2;
      ctx.drawImage(sprSunGlow, W / 2 - gs / 2, cy - gs / 2, gs, gs);
      /* horizon bloom */
      var hb = ctx.createLinearGradient(0, hor - H * 0.09, 0, hor + 2);
      hb.addColorStop(0, 'rgba(255,61,143,0)');
      hb.addColorStop(1, 'rgba(255,122,31,' + (0.22 + 0.4 * swell) + ')');
      ctx.fillStyle = hb;
      ctx.fillRect(0, hor - H * 0.09, W, H * 0.09 + 2);
      ctx.drawImage(spr, W / 2 - r, cy - r, r * 2, r * 2);
      ctx.globalAlpha = 1;
    }

    /* WIREFRAME MOUNTAINS flanking the sun */
    var aMtn = env(T, 4.05, 4.6, 6, 6.01);

    if (hissGain) hissGain.gain.setTargetAtTime(0.01, audioCtx.currentTime, 0.1);
    var settle = function () {
      if (audioCtx.state === 'running') {
        radioOn(); applyAudioUI(true);
        audioSync(curT); /* re-derive runout before the first scheduler tick */
        if (fromPrimer) {
          autoOnAt = performance.now();
          if (audioBtn && !RM) {
            audioBtn.classList.add('pulse');
            setTimeout(function () { audioBtn.classList.remove('pulse'); }, 1600);
          }
        }
        return true;
      }
      return false;
    };
    var p = audioCtx.resume();
    if (settle()) return;
    if (p && p.then) p.then(settle).catch(function () {});
  }
  if (audioBtn) audioBtn.addEventListener('click', function () {
    if (AE.on && autoOnAt >= 0 && performance.now() - autoOnAt < 400) { audioWanted = true; return; }
    audioWanted = !AE.on;
    setAudio(audioWanted);
  });

  /* Scroll arms the radio; the first activation-bearing event starts it.
     (Scroll gestures carry no user activation — house pattern, Side A.) */
  var audioWanted = store.get('acib_audio') !== '0';
  var SCROLL_KEYS = { 'ArrowDown': 1, 'PageDown': 1, 'End': 1, ' ': 1, 'Spacebar': 1 };
  var PRIME_EVENTS = ['wheel', 'scroll', 'keydown', 'touchmove', 'touchend', 'pointerdown'];
  var scrolledDown = false;
  var primeStartY = 0, prevTouchY = null;
  function teardownPrimers() {
    PRIME_EVENTS.forEach(function (t) { removeEventListener(t, onAudioPrime, true); });
    if (audioBtn) audioBtn.classList.remove('armed');
  }
  function onAudioPrime(e) {
    if (!audioWanted) { teardownPrimers(); return; }
    var t = e.type;
    if (audioBtn && e.target && audioBtn.contains && audioBtn.contains(e.target)) return;
    /* Activation-bearing gestures silently pre-unlock the context — even
       before any scroll — so a later wheel scroll (which browsers grant no
       activation of its own) can start the music by itself. The hiss floor
       stays muted until the radio actually commits. */
    if (!AE.on && (t === 'pointerdown' || t === 'keydown' || t === 'touchend')) {
      if (audioCtx || buildAudio()) {
        if (hissGain) hissGain.gain.value = 0.0001;
        try { audioCtx.resume(); } catch (e2) {}
      }
    }
    if (t === 'wheel') { if (e.deltaY > 0) scrolledDown = true; }
    else if (t === 'scroll') { if (scrollY > primeStartY + 4) scrolledDown = true; }
    else if (t === 'keydown') {
      if (e.target && e.target.closest && e.target.closest('button, a, input, textarea, select, [role="button"], [tabindex]')) return;
      if (SCROLL_KEYS[e.key]) scrolledDown = true;
    }
    else if (t === 'touchmove') {
      var y = e.touches && e.touches[0] ? e.touches[0].clientY : null;
      if (y !== null) {
        if (prevTouchY !== null && y < prevTouchY - 2) scrolledDown = true;
        prevTouchY = y;
      }
    }
    if (scrolledDown && !AE.on) setAudio(true, true);
    /* Still locked after a wheel-only scroll: blink the chip so the one
       tap it takes has a visible target (any tap anywhere also works). */
    if (audioBtn) audioBtn.classList.toggle('armed', audioWanted && scrolledDown && !AE.on);
    if (AE.on) teardownPrimers();
  }
  if (audioWanted) {
    primeStartY = scrollY;
    PRIME_EVENTS.forEach(function (t) {
      addEventListener(t, onAudioPrime, { passive: true, capture: true });
    });
  }

  document.addEventListener('visibilitychange', function () {
    if (!audioCtx) return;
    if (document.hidden) audioCtx.suspend();
    else if (AE.on) {
      audioCtx.resume();
      radioNextT = Math.max(radioNextT, audioCtx.currentTime + 0.05);
    }
  });

  /* Debug/tuning hook, same spirit as Side A's __aciSkipTrack */
  window.__ndState = function () {
    return {
      ctx: audioCtx ? audioCtx.state : 'none',
      on: AE.on, T: +curT.toFixed(3), target: +targetT.toFixed(3),
      scene: sceneIx, lift: lift, runout: runout, rm: RM
    };
  };

  /* ---------- SFX ---------- */
  /* SFX gate on a live clock: taps during an iOS interruption must be
     dropped, not queued at the frozen currentTime to burst on resume. */
  AE.blip = function () {
    if (!audioCtx || !AE.on || audioCtx.state !== 'running') return;
    noiseVoice(audioCtx.currentTime, 0.08, 'bandpass', 1400, 0.8, 0.25, sfxBus);
  };
  AE.horn = function () {
    if (!audioCtx || !AE.on || audioCtx.state !== 'running') return;
    var t = audioCtx.currentTime;
    [[t, 0.12, ['A4', 'E5']], [t + 0.18, 0.28, ['C5', 'G5']]].forEach(function (n) {
      n[2].forEach(function (note) {
        var o = audioCtx.createOscillator(); o.type = 'square'; o.frequency.value = freq(note);
        var bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1200; bp.Q.value = 1;
        var g = audioCtx.createGain();
        g.gain.setValueAtTime(0.0001, n[0]);
        g.gain.linearRampToValueAtTime(0.35, n[0] + 0.005);
        g.gain.setValueAtTime(0.35, n[0] + n[1]);
        g.gain.exponentialRampToValueAtTime(0.001, n[0] + n[1] + 0.08);
        o.connect(bp); bp.connect(g); g.connect(sfxBus);
        o.start(n[0]); o.stop(n[0] + n[1] + 0.1);
      });
    });
  };
  AE.rev = function () {
    if (!audioCtx || !AE.on || audioCtx.state !== 'running') return;
    var t = audioCtx.currentTime;
    var o = audioCtx.createOscillator(); o.type = 'sawtooth';
    o.frequency.setValueAtTime(70, t);
    o.frequency.exponentialRampToValueAtTime(330, t + 0.8);
    o.frequency.exponentialRampToValueAtTime(120, t + 1.5);
    var bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 2;
    bp.frequency.setValueAtTime(300, t);
    bp.frequency.exponentialRampToValueAtTime(1400, t + 0.8);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(0.3, t + 0.06);
    g.gain.exponentialRampToValueAtTime(0.001, t + 1.6);
    o.connect(bp); bp.connect(g); g.connect(sfxBus);
    o.start(t); o.stop(t + 1.7);
    noiseVoice(t, 0.5, 'bandpass', 900, 1.2, 0.12, sfxBus);
  };

  /* ---------- FX toggle ---------- */
  var fxBtn = $('#fxBtn');
  function applyFxUI() {
    if (!fxBtn) return;
    fxBtn.textContent = RM ? 'FX [Off]' : 'FX [On]';
    fxBtn.setAttribute('aria-pressed', RM ? 'false' : 'true');
  }
  if (fxBtn) {
    applyFxUI();
    fxBtn.addEventListener('click', function () {
      RM = !RM;
      document.documentElement.classList.toggle('rm', RM);
      store.set('aci_fx', RM ? '0' : '1');
      applyFxUI();
      lastStaticIx = -1; lastDrawnT = -9;
      if (driftC) driftC.style.opacity = 0;
      if (RM) {
        /* stale inline motion residue would freeze the slideshow off-pose */
        scenes.forEach(function (s) { s.style.removeProperty('--drift'); });
        car.style.removeProperty('transform');
      }
    });
  }
  /* OS reduced-motion flipped mid-session: follow it unless the visitor made
     an explicit FX choice this session (the session choice wins, Side A law). */
  if (rmMq && rmMq.addEventListener) rmMq.addEventListener('change', function (e) {
    if (store.get('aci_fx') !== null) return;
    RM = e.matches;
    document.documentElement.classList.toggle('rm', RM);
    applyFxUI();
    lastStaticIx = -1; lastDrawnT = -9;
    if (driftC) driftC.style.opacity = 0;
    if (RM) {
      scenes.forEach(function (s) { s.style.removeProperty('--drift'); });
      car.style.removeProperty('transform');
    }
  });

  /* ---------- Cheat: same code, new reward — TURBO ---------- */
  var KONAMI = ['arrowup', 'arrowup', 'arrowdown', 'arrowdown', 'arrowleft', 'arrowright', 'arrowleft', 'arrowright', 'b', 'a'];
  var kbuf = [];
  var osdflash = $('#osdflash');
  function turbo() {
    turboLeft = 4;
    if (osdflash) {
      osdflash.classList.add('on');
      setTimeout(function () { osdflash.classList.remove('on'); }, 1700);
    }
    if (AE.rev) AE.rev();
  }
  document.addEventListener('keydown', function (e) {
    kbuf.push((e.key || '').toLowerCase());
    if (kbuf.length > KONAMI.length) kbuf.shift();
    if (kbuf.join(',') === KONAMI.join(',')) { kbuf = []; turbo(); }
  });
  /* Touch alternative: triple-tap the speedo */
  var speedo = $('#dashSpeed');
  if (speedo) {
    var taps = [];
    speedo.addEventListener('pointerdown', function () {
      var now = Date.now();
      taps.push(now);
      taps = taps.filter(function (t) { return now - t < 900; });
      if (taps.length >= 3) { taps = []; turbo(); }
    });
  }

  /* ---------- Ignition ---------- */
  layout();
  resizeCanvas();
  /* Deep links: #trk04 (or ?trk=4) lands mid-track; #t=5.9 (or ?t=5.9)
     lands at a journey time. Query forms exist because headless fragment
     captures fire early — and they survive link unfurlers that strip hashes. */
  (function hashJump() {
    var ref = location.hash + ' ' + location.search;
    /* capture-rig extras: &audio=1 tunes in without a gesture (only works
       where the browser's autoplay policy allows it, i.e. test harnesses) */
    if (/[#?&]audio=1/.test(ref)) setTimeout(function () { setAudio(true); }, 30);
    var vm = /[#?&]vt=([0-9.]+)/.exec(ref);
    if (vm && isFinite(parseFloat(vm[1]))) { vtForce = clamp(parseFloat(vm[1]), 0, 6); return; }
    var m = /(?:^|[#?&])trk=?0?([1-6])(?:$|[^0-9])/.exec(ref);
    var y = -1;
    if (m) {
      var b = bands[+m[1] - 1];
      y = b.start + (b.end - b.start) * 0.55;
    } else if ((m = /[#?&]t=([0-9.]+)/.exec(ref))) {
      /* '#t=.' parses to NaN, which clamp passes through — a malformed
         shared link must load the top of the tape, not throw mid-ignition */
      var T = clamp(parseFloat(m[1]), 0, 6);
      if (isFinite(T)) {
        var i = clamp(Math.floor(T), 0, 5);
        var b2 = bands[i];
        y = b2.start + clamp(T - i, 0, 1) * (b2.end - b2.start);
      }
    }
    if (y >= 0) {
      /* html{scroll-behavior:smooth} animates even scrollTo — bypass it */
      var se = document.documentElement.style;
      se.scrollBehavior = 'auto';
      scrollTo(0, y);
      se.scrollBehavior = '';
    }
  })();
  read();
  curT = targetT;
  requestAnimationFrame(function (t0) { lastNow = t0; requestAnimationFrame(frame); });
  render(RM ? clamp(Math.floor(curT), 0, 5) + 0.5 : curT, 0);
  choreo(curT);
})();
</script>
